<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos_Secure // Spatial Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="glass-card">
        <header>
            <div class="atmos-logo">
                <span class="dot"></span>
                <span class="dot pulse"></span>
                ATMOS_SECURE
            </div>
            <h1>Spatial Key Generator</h1>
            <p class="subtitle">High-fidelity, randomized entropy generation</p>
        </header>

        <div class="display-container">
            <input type="text" id="password-display" readonly placeholder="Click Generate">
            <button id="copy-btn" title="Copy to clipboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
        </div>

        <div class="strength-meter">
            <div class="strength-bar" id="strength-bar"></div>
            <span id="strength-text">Strength: Empty</span>
        </div>

        <div class="controls">
            <div class="control-group">
                <div class="slider-header">
                    <label for="length-slider">Length</label>
                    <span id="length-val">16</span>
                </div>
                <input type="range" id="length-slider" min="6" max="32" value="16">
            </div>

            <div class="checkbox-grid">
                <label class="checkbox-container">
                    <input type="checkbox" id="uppercase" checked>
                    <span class="checkmark"></span>
                    Uppercase
                </label>
                <label class="checkbox-container">
                    <input type="checkbox" id="lowercase" checked>
                    <span class="checkmark"></span>
                    Lowercase
                </label>
                <label class="checkbox-container">
                    <input type="checkbox" id="numbers" checked>
                    <span class="checkmark"></span>
                    Numbers
                </label>
                <label class="checkbox-container">
                    <input type="checkbox" id="symbols" checked>
                    <span class="checkmark"></span>
                    Symbols
                </label>
            </div>
        </div>

        <button id="generate-btn">Generate Key</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
